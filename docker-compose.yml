services:
  postgres:
    image: postgres:16-alpine
    container_name: campaign_manager_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: campaign_manager
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
  
  migration:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile.migrate
    container_name: campaign_manager_migration
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/campaign_manager
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    container_name: campaign_manager_backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/campaign_manager
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_EXPIRES_IN: 24h
    depends_on:
      postgres:
        condition: service_healthy 

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    container_name: campaign_manager_frontend
    ports:
      - "80:80"
    environment:
      VITE_API_URL: /api
    depends_on:
      - backend

volumes:
  postgres_data:
